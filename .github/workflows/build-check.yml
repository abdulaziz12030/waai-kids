name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://lqbyvlyjjxjcbfqbtsxf.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: build-check-placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build application and capture output
        id: build
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish build failure diagnostic
        if: steps.build.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "Automated Next.js build failure for commit \`${GITHUB_SHA}\`."
            echo
            echo '```text'
            tail -n 160 build.log
            echo '```'
          } > build-issue.md
          gh issue create --title "Build failure diagnostic ${GITHUB_SHA}" --body-file build-issue.md
          exit 1
