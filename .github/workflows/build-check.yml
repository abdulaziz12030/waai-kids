name: Build Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://lqbyvlyjjxjcbfqbtsxf.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: build-check-placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
