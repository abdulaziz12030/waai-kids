name: Validate Sullam Generator

on:
  pull_request:
    paths:
      - scripts/generate_sullam_wikisource.py
      - .github/workflows/sullam-diagnostic.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install parser dependencies
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4
      - name: Generate and capture diagnostics
        id: generate
        shell: bash
        run: |
          set +e
          python scripts/generate_sullam_wikisource.py > sullam-diagnostic.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          cat sullam-diagnostic.log
          exit 0
      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: sullam-diagnostic
          path: |
            sullam-diagnostic.log
            public/content/religious-sciences/sullam-al-wusul.json
          if-no-files-found: warn
      - name: Fail when generation failed
        if: steps.generate.outputs.exit_code != '0'
        run: exit 1
      - name: Show generated summary
        if: steps.generate.outputs.exit_code == '0'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('public/content/religious-sciences/sullam-al-wusul.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          print('chapters=', len(data['chapters']))
          print('verses=', sum(len(chapter['verses']) for chapter in data['chapters']))
          print('first=', data['chapters'][0]['verses'][0]['full_text'])
          print('last=', data['chapters'][-1]['verses'][-1]['full_text'])
          PY
