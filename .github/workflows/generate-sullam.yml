name: Generate Sullam JSON

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/generate_sullam_wikisource.py
      - scripts/build_sullam_content.py
      - .github/workflows/generate-sullam.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install parser dependencies
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4

      - name: Generate and validate JSON
        run: python scripts/build_sullam_content.py

      - name: Commit generated content
        run: |
          if git diff --quiet -- public/content/religious-sciences/sullam-al-wusul.json; then
            echo "Generated JSON is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/content/religious-sciences/sullam-al-wusul.json
          git commit -m "content: add Sullam al-Wusul Wikisource JSON"
          git push origin HEAD:main
